<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="card-container">
      <img
        src="./assets/image1.jpg"
        alt="Productivity Image"
        class="background-img"
      />

      <div class="logo-background">
        <img src="./assets/odin-lined.png" alt="Logo" class="logo" />
        <span class="text">ODIN</span>
      </div>
    </div>

    <div class="right">
      <div class="hero">
        This is not a real online service! You need to need something like this
        in your life to realize your deepest dreams. Sign up now to get started!
        <br /><br /><em>You know you want to!</em>
      </div>

      <form action="" method="post">
        <div class="form-section">
          <div class="form-heading">Let's do this!</div>
          <div class="form-wrapper">
            <div class="fname">
              <label for="fname">First Name <br /></label>
              <input type="text" name="fname" id="fname" />
            </div>

            <div class="lname">
              <label for="lname">Last Name <br /></label>
              <input type="text" name="lname" id="lname" />
            </div>

            <div class="email">
              <label for="email">Email <br /></label>
              <input type="email" name="email" id="email" />
            </div>

            <div class="phone">
              <label for="phone">Phone Number <br /></label>
              <input type="tel" name="phone" id="phone" />
            </div>

            <div class="pass">
              <label for="pass">Password <br /></label>
              <input type="password" name="pass" id="pass" />
            </div>

            <div class="cpass">
              <label for="cpass">Confirm Password <br /></label>
              <input type="password" name="cpass" id="cpass" />
            </div>
          </div>
        </div>
        <div class="submit-form">
          <button class="submit-btn" type="submit">Create Account</button>
          <br /><br />
          <div class="login-text">
            Already have an account? <span class="link">Log in</span>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
